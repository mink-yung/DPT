<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="2-1.css">
    <title>미션 결과</title>
    <style>
        .result-card {
            text-align: center;
            padding: 50px 20px;
        }

        .treasure-box {
            width: 180px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .treasure-box:active {
            transform: scale(0.9);
        }

        .reward-img {
            width: 100%;
            max-width: 300px;
            border-radius: 15px;
            margin: 20px 0;
            border: 3px solid #39FF14;
        }

        .hidden {
            display: none;
        }

        .success-title {
            color: #39FF14;
            font-size: 28px;
            font-weight: 900;
        }

        .reward-text {
            font-size: 20px;
            font-weight: bold;
            margin-top: 10px;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>
    <header class="header">
        <button class="back-btn" onclick="location.href='2-1.html'"><img src="./img/back.png"></button>
        <div class="logo-container"><img src="./img/bennerminilogo.png" class="logo"></div>
    </header>

    <main id="result-container" class="result-card">
        <div id="view-fail" class="hidden">
            <h2 style="color:#ff4d4d; font-size:28px;">아쉬워요!</h2>
            <img src="./img/fail_icon.png" style="width:150px; margin:30px 0;">
            <p>정답이 아니네요.<br>다시 한번 확인해보세요!</p>
            <button class="mission-btn" onclick="history.back()">다시 도전하기</button>
        </div>

        <div id="view-box" class="hidden">
            <h2 class="success-title">정답입니다!</h2>
            <p style="margin-bottom:30px;">보물이 든 상자가 나타났어요!</p>
            <img src="./img/treasure_box.png" class="treasure-box" onclick="openTreasure()">
            <p style="margin-top:20px; color:#666; font-size:14px;">상자를 터치해서 보물을 확인하세요.</p>
        </div>

        <div id="view-reward" class="hidden">
            <h2 id="reward-title" class="success-title">보물 획득!</h2>
            <div id="reward-content">
                <img src="" id="res-img" class="reward-img hidden">
                <p id="res-text" class="reward-text"></p>
            </div>
            <p style="font-size:13px; color:#888; margin-top:20px;">✅ 30분 동안 다른 미션 참여가 제한됩니다.</p>
            <button class="mission-btn" style="margin-top:20px;" onclick="location.href='2-1.html'">지도로 돌아가기</button>
        </div>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const status = params.get('status');
        const type = params.get('type');
        const content = params.get('content');
        const imgPath = params.get('img');

        window.onload = function () {
            if (status === 'success') {
                document.getElementById('view-box').classList.remove('hidden');
            } else {
                document.getElementById('view-fail').classList.remove('hidden');
            }
        };

        function openTreasure() {
            document.getElementById('view-box').classList.add('hidden');
            document.getElementById('view-reward').classList.remove('hidden');

            const resImg = document.getElementById('res-img');
            const resText = document.getElementById('res-text');
            const resTitle = document.getElementById('reward-title');

            if (type === 'note') {
                resTitle.innerText = "행운의 쪽지";
                resText.innerText = content;
                // 쪽지는 이미지가 없을 수 있으므로 텍스트 강조
            } else if (type === 'gifticon') {
                resTitle.innerText = "기프티콘 당첨!";
                resImg.src = imgPath; // 백엔드에서 준 이미지 경로
                resImg.classList.remove('hidden');
                resText.innerText = content;
            } else if (type === 'meme') {
                resTitle.innerText = "재미있는 짤";
                resImg.src = imgPath;
                resImg.classList.remove('hidden');
                resText.innerText = content;
            }
        }
    </script>
</body>

</html>
