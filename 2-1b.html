<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>미션: 사진 인증</title>
    <link rel="stylesheet" href="2-1.css">
</head>

<body class="mission-body">
    <header class="header">
        <button class="back-btn" onclick="history.back()"><img src="./img/back.png"></button>
        <div class="logo-container"><img src="./img/bennerminilogo.png" class="logo"></div>
    </header>

    <main class="mission-content">
        <div class="mission-card">
            <img id="location-image" src="" alt="장소 이미지" style="display:none;">
            
            <h2 id="location-name">장소 로딩 중...</h2>
            
            <div class="mission-box">
                <p class="mission-label">PHOTO MISSION</p>
                <p id="mission-text" class="mission-text">인증샷을 촬영하여 업로드해주세요!</p>
            </div>

            <div class="file-upload-area" onclick="document.getElementById('photo-file').click()">
                <img src="./img/camera_icon.png" id="preview-img" style="width: 50px;">
                <p id="file-name">사진 선택 또는 촬영</p>
            </div>
            
            <input type="file" id="photo-file" accept="image/*" style="display:none;" onchange="updateFileName(this)">

            <button class="submit-btn" onclick="submitPhoto()">사진 제출</button>
        </div>
    </main>

    <script>
        const API_URL = "https://dopamine-treasure-backend-production.up.railway.app";
        const urlParams = new URLSearchParams(window.location.search);
        const locationId = urlParams.get('id');

        // 1. 페이지 로드 시 장소 이름 설정
        window.onload = function() {
            const placeNames = {
                '1': '도서관', '2': '학생회관', '3': '종합관', '4': '아마랜스 홀',
                '5': '정문', '6': '미래혁신관', '7': '인문사회융합대학', '8': 'ICT융합대학'
            };
            if (locationId && placeNames[locationId]) {
                document.getElementById('location-name').innerText = placeNames[locationId];
            }
        };

        // 2. 사진 선택 시 미리보기 보여주기
        function updateFileName(input) {
            const previewImg = document.getElementById('preview-img');
            const fileNameText = document.getElementById('file-name');

            if (input.files && input.files[0]) {
                const reader = new FileReader();

                reader.onload = function(e) {
                    // 카메라 아이콘을 선택한 사진으로 교체
                    previewImg.src = e.target.result;
                    
                    // 사진 스타일 조정 (커지게)
                    previewImg.style.width = '100%';
                    previewImg.style.height = 'auto';
                    previewImg.style.maxHeight = '250px';
                    previewImg.style.objectFit = 'contain';
                    previewImg.style.borderRadius = '10px';
                    
                    // 파일명 표시
                    fileNameText.innerText = input.files[0].name;
                };

                reader.readAsDataURL(input.files[0]);
            }
        }

        // 3. 사진 제출 함수
        async function submitPhoto() {
            const fileInput = document.getElementById('photo-file');
            if (!fileInput.files[0]) return alert("사진을 촬영하거나 업로드해주세요!");

            const userInfo = JSON.parse(localStorage.getItem('userInfo')) || {};

            const formData = new FormData();
            formData.append('name', userInfo.name || "익명");
            formData.append('student_id', userInfo.student_id || "00000000");
            formData.append('department', userInfo.department || "미소속");
            formData.append('mission_type', 'photo');
            formData.append('image', fileInput.files[0]);

            try {
                const response = await fetch(`${API_URL}/locations/${locationId}/verify`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (result.success || result.status === 'success') {
                    location.href = `2-1-phone.html?id=${locationId}`;
                } else {
                    alert("제출 실패: " + (result.message || "다시 시도해주세요."));
                }
            } catch (error) {
                alert("업로드 에러 발생");
            }
        }
    </script>
</body>

</html>
