<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> participant info modal</title>
    <link rel="stylesheet" href="landing.css">
    <style>
        /* 4-2-b1.html specific styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .modal-header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .close-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .close-btn:hover {
            background: rgba(0, 0, 0, 0.1);
            transform: rotate(90deg);
        }
        
        .close-btn img {
            width: 24px;
            height: 24px;
        }
        
        .modal-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .participant-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(45deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 2rem;
            margin: 0 auto 20px;
        }
        
        .info-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
        }
        
        .info-title {
            font-weight: bold;
            color: #333;
            font-size: 1.2rem;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
        }
        
        .info-label {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 5px;
            font-weight: 500;
        }
        
        .info-value {
            font-weight: bold;
            color: #333;
            font-size: 1.1rem;
        }
        
        .treasure-count {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            margin-top: 20px;
        }
        
        .modal-title {
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .modal-container {
                padding: 20px;
                margin: 20px;
                width: calc(100% - 40px);
            }
            
            .info-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            
            .participant-avatar {
                width: 60px;
                height: 60px;
                font-size: 1.5rem;
            }
            
            .modal-title {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="modal-overlay">
        <div class="modal-container">
            <!-- 4-2-b1.html specific styles -->
            <div class="modal-header">
                <button class="close-btn" onclick="closeModal()">
                    <img src="./img/close.png" alt="close" onerror="this.style.display='none'; this.parentElement.innerHTML='X';">
                </button>
            </div>
            
            <div class="modal-content">
                <div class="modal-title">participant info</div>
                
                <div class="participant-avatar" id="participantAvatar">
                    A
                </div>
                
                <div class="info-section">
                    <div class="info-title">participant information</div>
                    <div class="info-grid">
                        <div class="info-item">
                            <span class="info-label">department</span>
                            <span class="info-value" id="department">loading...</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">student id</span>
                            <span class="info-value" id="studentId">loading...</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">name</span>
                            <span class="info-value" id="name">loading...</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">treasure count</span>
                            <span class="info-value" id="treasureCount">loading...</span>
                        </div>
                    </div>
                </div>
                
                <div class="treasure-count">
                    total treasures: <span id="totalCount">0</span>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // url parameter from 4-2-b
        const urlParams = new URLSearchParams(window.location.search);
        const participantId = urlParams.get('id');
        const API_URL = "https://dopamine-treasure-backend-production.up.railway.app";
        
        // load participant data
        window.onload = function() {
            if (participantId) {
                loadParticipantInfo(participantId);
            } else {
                // sample data for testing
                loadSampleData();
            }
        };
        
        // close modal
        function closeModal() {
            window.close();
            // if window.close doesn't work, go back
            window.location.href = '4-2-b.html';
        }
        
        // load participant data from api
        async function loadParticipantInfo(id) {
            try {
                const response = await fetch(`${API_URL}/admin/stats?student_id=${id}`);
                const data = await response.json();
                
                if (data.stats && data.stats.length > 0) {
                    const participant = data.stats[0];
                    displayParticipantInfo(participant);
                } else {
                    loadSampleData();
                }
            } catch (error) {
                console.error('error loading participant info:', error);
                loadSampleData();
            }
        }
        
        // display participant info
        function displayParticipantInfo(participant) {
            document.getElementById('department').textContent = participant.department || 'unknown';
            document.getElementById('studentId').textContent = participant.student_id || 'unknown';
            document.getElementById('name').textContent = participant.name || 'unknown';
            document.getElementById('treasureCount').textContent = participant.claimed_count || 0;
            document.getElementById('totalCount').textContent = participant.claimed_count || 0;
            
            // update avatar
            const avatar = document.getElementById('participantAvatar');
            if (participant.name) {
                avatar.textContent = participant.name.charAt(0).toUpperCase();
            }
        }
        
        // sample data for testing
        function loadSampleData() {
            const sampleData = {
                name: 'hong gildong',
                department: 'child and family welfare',
                student_id: '20240001',
                claimed_count: 3
            };
            displayParticipantInfo(sampleData);
        }
        
                
            </script>
</body>
</html>
