<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 보물맵 - 도파민 보물섬</title>
    <link rel="stylesheet" href="2-1.css">
</head>
<body>
    <!-- 상단 헤더 -->
    <header class="header">
        <div class="header-content">
            <!-- 뒤로가기 버튼 -->
            <button class="back-btn" onclick="goBack()">
                <img src="./img/back.png" alt="뒤로가기" class="btn-image">
            </button>
            
            <!-- 도파민 보물섬 로고 -->
            <div class="logo-container">
                <img src="./img/bennerminilogo.png" alt="도파민 보물섬" class="logo">
            </div>
        </div>
    </header>

    <!-- 메인 콘텐츠 -->
    <main class="main-content">
        <!-- 수원대 실시간 보물맵 타이틀 -->
        <section class="map-section">
            <h2 class="map-title">수원대 실시간 보물맵</h2>
            
            <!-- 카카오 지도 API 박스 -->
            <div class="map-container">
                <div id="kakao-map" class="kakao-map">
                    <!-- 카카오 지도 API가 여기에 로드됩니다 -->
                    <div class="map-placeholder">
                        <p>카카오 지도 로딩 중...</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- 실시간 잔여 보물 현황 -->
        <section class="treasure-status-section">
            <h3 class="status-title">실시간 잔여 보물 현황</h3>
            
            <!-- 장소 카드 리스트 (2열 5행) -->
            <div class="locations-grid">
                <!-- 1. 도서관 -->
                <article class="place-card" data-id="1">
                    <div class="place-name">도서관</div>
                    <div class="treasure-count">0/10</div>
                    <button class="mission-btn" onclick="selectMission(1)">미션 선택</button>
                </article>
                
                <!-- 2. 학생회관 -->
                <article class="place-card" data-id="2">
                    <div class="place-name">학생회관</div>
                    <div class="treasure-count">0/10</div>
                    <button class="mission-btn" onclick="selectMission(2)">미션 선택</button>
                </article>
                
                <!-- 3. 본관 -->
                <article class="place-card" data-id="3">
                    <div class="place-name">본관</div>
                    <div class="treasure-count">0/10</div>
                    <button class="mission-btn" onclick="selectMission(3)">미션 선택</button>
                </article>
                
                <!-- 4. 아마란스관 -->
                <article class="place-card" data-id="4">
                    <div class="place-name">아마란스관</div>
                    <div class="treasure-count">0/10</div>
                    <button class="mission-btn" onclick="selectMission(4)">미션 선택</button>
                </article>
                
                <!-- 5. 정문 -->
                <article class="place-card" data-id="5">
                    <div class="place-name">정문</div>
                    <div class="treasure-count">0/10</div>
                    <button class="mission-btn" onclick="selectMission(5)">미션 선택</button>
                </article>
                
                <!-- 6. 미래혁신관 -->
                <article class="place-card" data-id="6">
                    <div class="place-name">미래혁신관</div>
                    <div class="treasure-count">0/10</div>
                    <button class="mission-btn" onclick="selectMission(6)">미션 선택</button>
                </article>
                
                <!-- 7. 인문사회과학관 -->
                <article class="place-card" data-id="7">
                    <div class="place-name">인문사회과학관</div>
                    <div class="treasure-count">0/10</div>
                    <button class="mission-btn" onclick="selectMission(7)">미션 선택</button>
                </article>
                
                <!-- 8. SW 융합대학 -->
                <article class="place-card" data-id="8">
                    <div class="place-name">SW 융합대학</div>
                    <div class="treasure-count">0/10</div>
                    <button class="mission-btn" onclick="selectMission(8)">미션 선택</button>
                </article>
                
                <!-- 9. 야구장 -->
                <article class="place-card" data-id="9">
                    <div class="place-name">야구장</div>
                    <div class="treasure-count">0/10</div>
                    <button class="mission-btn" onclick="selectMission(9)">미션 선택</button>
                </article>
                
                <!-- 10. 중앙운동장 -->
                <article class="place-card" data-id="10">
                    <div class="place-name">중앙운동장</div>
                    <div class="treasure-count">0/10</div>
                    <button class="mission-btn" onclick="selectMission(10)">미션 선택</button>
                </article>
            </div>
        </section>
    </main>

    <!-- 카카오 지도 API 스크립트 -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=YOUR_APP_KEY"></script>
    <script src="2-1.js"></script>
</body>
</html>
